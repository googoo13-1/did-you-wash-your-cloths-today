<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>
body{
  font-family:system-ui;
  max-width:420px;
  margin:auto;
  padding:20px;
  background:#f7f8fa;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
}
</style>
</head>

<body>

<h2>⚙️ Settings</h2>

<div class="card">

  <p>Default Wash Limit</p>

  <input id="defaultLimit" type="number" placeholder="e.g. 3" />

  <br><br>

  <button onclick="saveSettings()">Save</button>

</div>

<a href="today.html">← Back</a>

<script>

function saveSettings(){

  let limit = document.getElementById("defaultLimit").value;

  localStorage.setItem("default_limit", limit);

  alert("Saved!");
}

</script>

</body>
</html>
