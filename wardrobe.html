<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wardrobe</title>

<style>
body{
  font-family:system-ui;
  max-width:420px;
  margin:auto;
  padding:20px;
  background:#f7f8fa;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.bar{
  height:6px;
  background:#eee;
  border-radius:5px;
  overflow:hidden;
  margin:8px 0;
}

.fill{
  height:6px;
  background:#007AFF;
}

.badge{
  font-size:12px;
  padding:3px 8px;
  border-radius:999px;
  display:inline-block;
  margin-top:5px;
}

.high{ background:#ffdddd; color:#c00; }
.mid{ background:#fff3cd; color:#8a6d00; }
.low{ background:#e6f7ff; color:#0077aa; }

</style>

</head>

<body>

<h2>👕 Wardrobe</h2>

<div id="list"></div>

<a href="today.html">← Today</a>

<script>

let state =
JSON.parse(localStorage.getItem("clothes")) || [];

function render(){

let html = "";

state.forEach((item)=>{

  let percent = Math.min(
    100,
    (item.count / item.limit) * 100
  );

  // usage level
  let usage = "low";
  if(item.count >= item.limit){
    usage = "high";
  } else if(item.count >= item.limit/2){
    usage = "mid";
  }

  html += `
    <div class="card">

      <b>${item.name}</b>

      ${item.status === "needs wash" ? " 🧼" : ""}

      <div class="bar">
        <div class="fill" style="width:${percent}%"></div>
      </div>

      <div>
        Worn: ${item.count} / ${item.limit}
      </div>

      <span class="badge ${usage}">
        ${usage.toUpperCase()} USE
      </span>

    </div>
  `;
});

document.getElementById("list").innerHTML = html;

}

render();

</script>

</body>
</html>
