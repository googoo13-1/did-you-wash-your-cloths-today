<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Today</title>
  <style>
    body {
      font-family: system-ui;
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
      background: #f7f8fa;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #007AFF;
      color: white;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      border-top: 1px solid #eee;
    }
  </style>
</head>

<body>

<h2>🧺 Today</h2>

<button onclick="addCloth()">
+ Add Clothes
</button>

<div id="list"></div>

<script>

let clothes =
JSON.parse(localStorage.getItem("clothes")) || [];

function save(){
 localStorage.setItem(
   "clothes",
   JSON.stringify(clothes)
 );
}

function render(){

 let html="";

 clothes.forEach((item,index)=>{

   html += `
   <div style="
   background:white;
   padding:15px;
   margin-top:10px;
   border-radius:10px;
   ">

   <b>${item.name}</b><br>

   Worn ${item.count} times

   <br><br>

   <button onclick="wear(${index})">
   Wear +1
   </button>

   <button onclick="wash(${index})">
   Washed
   </button>

   </div>
   `;

 });

 document.getElementById("list").innerHTML =
 html;

 save();

}

function addCloth(){

 const name =
 prompt("Cloth name");

 if(!name) return;

clothes.push({
   name:name,
   count:0,
   limit:3
});

 render();
${item.count >= item.limit
 ? '<br><span style="color:red">🧼 Time to Wash</span>'
 : ''
}
}

function wear(index){

 clothes[index].count++;

 render();

}

function wash(index){

 clothes[index].count=0;

 render();

}

render();

</script>

</body>
</html>
