<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Today</title>

  <style>
    body {
      font-family: system-ui;
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
      background: #f7f8fa;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-top: 10px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #007AFF;
      color: white;
      margin-right: 5px;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      border-top: 1px solid #eee;
    }

    .nav a{
      text-decoration:none;
      color:#333;
      font-weight:600;
    }
  </style>
</head>

<body>

<h2>🧺 Today</h2>

<button onclick="addCloth()">+ Add Clothes</button>

<div id="list"></div>

<h3>Today Log</h3>
<div id="log"></div>

<script>

let clothes =
JSON.parse(localStorage.getItem("clothes")) || [];

let stateLogs =
JSON.parse(localStorage.getItem("logs")) || {};

// ⭐ FIX + PART 3：默认设置
let defaultLimit =
Number(localStorage.getItem("default_limit")) || 3;

function save(){
  localStorage.setItem("clothes", JSON.stringify(clothes));
  localStorage.setItem("logs", JSON.stringify(stateLogs));
}

function render(){

  let html = "";

  clothes.forEach((item, index) => {

    html += `
      <div class="card">

        <b>${item.name}</b>
        ${item.status === "needs wash" ? " 🧼" : ""}

        <br>

        Worn ${item.count} / ${item.limit} times

        ${
          item.count >= item.limit
          ? '<br><span style="color:red;font-weight:bold;">🧼 Time to Wash</span>'
          : ''
        }

        <br><br>

        <button onclick="wear(${index})">Wear +1</button>

        <button onclick="wash(${index})">Washed</button>

      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;

  save();

  renderLog();
}

function addCloth(){

  const name = prompt("Cloth name");
  if(!name) return;

  // ⭐ PART 3：使用 settings 默认值
  clothes.push({
    name: name,
    count: 0,
    limit: defaultLimit,
    status: "clean",
    type: "normal"
  });

  render();
}

function wear(index){

  clothes[index].count++;

  if (clothes[index].count >= clothes[index].limit) {
    clothes[index].status = "needs wash";
  }

  // ⭐ LOG SYSTEM
  let today = new Date().toISOString().split("T")[0];

  if (!stateLogs[today]) {
    stateLogs[today] = [];
  }

  stateLogs[today].push(clothes[index].name);

  render();
}

function wash(index){

  clothes[index].count = 0;
  clothes[index].status = "clean";

  render();
}

function renderLog(){

  let today = new Date().toISOString().split("T")[0];

  let list = stateLogs[today] || [];

  document.getElementById("log").innerHTML =
    list.map(item => `<div>👕 ${item}</div>`).join("");
}

render();

</script>

<div class="nav">
  <a href="today.html">🧺 Today</a>
  <a href="wardrobe.html">👕 Wardrobe</a>
  <a href="settings.html">⚙️ Settings</a>
</div>

</body>
</html>
